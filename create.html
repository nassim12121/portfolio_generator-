<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function () {
      fetch('session-check.php', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (!d || !d.loggedIn) {
            window.location.replace('login.html');
          }
        })
        .catch(function () {
          window.location.replace('login.html');
        });
    })();
  </script>
</head>
<body>
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="create.html">Create</a>
      <a href="logout.php">Logout</a>
    </nav>
  </header>

  <main class="container">
    <h1>Create Portfolio</h1>
    <p class="muted">Simple form (demo only).</p>

    <label for="firstName">First Name</label>
    <input id="firstName" type="text">

    <label for="lastName">Last Name</label>
    <input id="lastName" type="text">

    <label for="jobTitle">Job Title</label>
    <input id="jobTitle" type="text">

    <label for="email">Email</label>
    <input id="email" type="email">

    <label for="bioLong">Bio</label>
    <textarea id="bioLong" rows="5"></textarea>

    <button type="button" onclick="submitForm()">Save</button>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
